apiVersion: v1
kind: Service
metadata:
  name: milvus
  namespace: milvus
spec:
  # Minikube: NodePort — access via `minikube service milvus -n milvus`
  #           or port-forward: kubectl port-forward svc/milvus 19530:19530 -n milvus
  # GKE:      Change type to LoadBalancer for a public IP
  type: NodePort
  # type: LoadBalancer
  selector:
    app: milvus
  ports:
    - name: grpc
      port: 19530
      targetPort: 19530
    - name: metrics
      port: 9091
      targetPort: 9091